<svg width="360" height="210" xmlns="http://www.w3.org/2000/svg">
<style>
svg {
  font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif;
  font-size: 14px;
  line-height: 21px;
}

#background {
  width: 100%;
  height: 100%;
  fill: #22272e;
  stroke: #444c56;
  stroke-width: 1px;
  rx: 6px;
  ry: 6px;
}

foreignObject {
  width: calc(100% - 42px);
  height: calc(100% - 32px);
}

h2 {
  margin-top: 0;
  margin-bottom: 0.75em;
  line-height: 24px;
  font-size: 16px;
  font-weight: 600;
  color: #cdd9e5;
}

ul {
  list-style: none;
  padding-left: 0;
  margin-top: 0;
  margin-bottom: 0;
}

li {
  display: inline-flex;
  font-size: 12px;
  margin-right: 2ch;
  align-items: center;
  flex-wrap: nowrap;
  transform: translateX(-500%);
  animation: slideIn 2s ease-in-out forwards;
}

@keyframes slideIn {
  to { transform: translateX(0); }
}

.octicon {
  margin-right: 0.5ch;
  vertical-align: top;
}

.progress {
  display: flex;
  height: 8px;
  overflow: hidden;
  background-color: #2d333b;
  border-radius: 6px;
  margin-bottom: 1em;
}

.progress-item {
  outline: 2px solid #22272e;
}

.lang {
  font-weight: 600;
  margin-right: 4px;
  color: #cdd9e5;
}

.percent {
  color: #adbac7;
}
</style>
<g>
<rect x="0" y="0" id="background" />
<foreignObject x="21" y="17" width="318" height="176">
<div xmlns="http://www.w3.org/1999/xhtml">
<h2>Languages Used (By File Size)</h2>
<div><span class="progress"><span style="background-color: #178600;width: 97.667%;" class="progress-item"></span><span style="background-color: #3572A5;width: 1.760%;" class="progress-item"></span><span style="background-color: #e34c26;width: 0.463%;" class="progress-item"></span><span style="background-color: #222c37;width: 0.103%;" class="progress-item"></span><span style="background-color: #a52a22;width: 0.003%;" class="progress-item"></span><span style="background-color: #89e051;width: 0.002%;" class="progress-item"></span><span style="background-color: #f1e05a;width: 0.002%;" class="progress-item"></span></span></div>
<ul>
<li style="animation-delay: 0ms;">
<svg xmlns="http://www.w3.org/2000/svg" class="octicon" style="fill:#178600;"
viewBox="0 0 16 16" version="1.1" width="16" height="16"><path
fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8z"></path></svg>
<span class="lang">C#</span>
<span class="percent">97.67%</span>
</li>


<li style="animation-delay: 150ms;">
<svg xmlns="http://www.w3.org/2000/svg" class="octicon" style="fill:#3572A5;"
viewBox="0 0 16 16" version="1.1" width="16" height="16"><path
fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8z"></path></svg>
<span class="lang">Python</span>
<span class="percent">1.76%</span>
</li>


<li style="animation-delay: 300ms;">
